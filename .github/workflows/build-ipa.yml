name: Build IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild \
            -project VTeenWebView.xcodeproj \
            -scheme VTeenWebView \
            -sdk iphoneos \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=$PWD/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Check build output
        run: |
          echo "=== BUILD FOLDER ==="
          ls -la build
          echo "=== APP FILE ==="
          find build -name "*.app"

      - name: Package IPA
        run: |
          rm -rf Payload VTeenWebView.ipa
          mkdir -p Payload
          cp -R build/VTeenWebView.app Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload VTeenWebView.ipa

      - name: Check IPA size
        run: |
          echo "=== IPA SIZE ==="
          ls -lh VTeenWebView.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VTeenWebView-ipa
          path: VTeenWebView.ipa
