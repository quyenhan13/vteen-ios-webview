name: Build IPA (Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: |
          rm -rf *.xcodeproj
          xcodegen generate

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app
        run: |
          rm -rf build DerivedData Payload *.ipa
          mkdir -p build

          xcodebuild \
            -project $(find . -name "*.xcodeproj" | head -n 1) \
            -scheme VTeenWebView \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath DerivedData \
            CONFIGURATION_BUILD_DIR=$PWD/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Create IPA chuẩn Apple
        run: |
          APP=$(find build -name "*.app" | head -n 1)

          mkdir Payload
          cp -R "$APP" Payload/

          ditto -c -k --sequesterRsrc --keepParent Payload VTeenWebView.ipa

      - name: Check IPA
        run: |
          echo "=== SIZE ==="
          ls -lh VTeenWebView.ipa
          echo "=== CONTENT ==="
          unzip -l VTeenWebView.ipa | head -n 40

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: IPA
          path: VTeenWebView.ipa
