name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild \
          -scheme VTeenWebView \
          -sdk iphoneos \
          -configuration Release \
          -archivePath $PWD/build/VTeenWebView.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p Payload
          cp -r build/VTeenWebView.xcarchive/Products/Applications/*.app Payload/
          zip -r VTeenWebView.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VTeenWebView-ipa
          path: VTeenWebView.ipa
