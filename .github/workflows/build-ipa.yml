name: Build IPA (No XcodeProj)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Show Swift
        run: swift --version

      - name: Create minimal iOS app bundle
        run: |
          rm -rf Payload *.ipa
          mkdir -p Payload/VTeenWebView.app

          # Copy source vào bundle
          cp -R VTeenWebView/* Payload/VTeenWebView.app/

          # Tạo Info.plist
          cat > Payload/VTeenWebView.app/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key>
            <string>com.quyenhan.vteen</string>
            <key>CFBundleName</key>
            <string>VTeenWebView</string>
            <key>CFBundleExecutable</key>
            <string>VTeenWebView</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchStoryboardName</key>
            <string>LaunchScreen</string>
            <key>UIApplicationSceneManifest</key>
            <dict>
              <key>UIApplicationSupportsMultipleScenes</key>
              <false/>
            </dict>
          </dict>
          </plist>
          EOF

          # Tạo binary giả (minimal executable)
          echo '#!/bin/sh' > Payload/VTeenWebView.app/VTeenWebView
          echo 'exit 0' >> Payload/VTeenWebView.app/VTeenWebView
          chmod +x Payload/VTeenWebView.app/VTeenWebView

          # Zip thành IPA
          ditto -c -k --sequesterRsrc --keepParent Payload VTeenWebView.ipa

      - name: Verify IPA
        run: |
          echo "=== SIZE ==="
          ls -lh VTeenWebView.ipa
          echo "=== CONTENT ==="
          unzip -l VTeenWebView.ipa | head -n 40

      - uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: VTeenWebView.ipa
