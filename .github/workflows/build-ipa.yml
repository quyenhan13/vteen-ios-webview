name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Show project
        run: |
          find . -name "*.xcodeproj"
          find . -name "*.swift"

      - name: Build
        run: |
          xcodebuild \
            -project web-view.xcodeproj \
            -scheme web-view \
            -configuration Release \
            -sdk iphoneos \
            BUILD_DIR=build \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Create IPA
        run: |
          mkdir Payload
          cp -R build/Release-iphoneos/*.app Payload/
          zip -r app.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: app.ipa
