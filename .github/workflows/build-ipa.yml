name: Build IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Show project files
        run: |
          pwd
          ls -la
          ls -la VTeenWebView

      - name: Build app to local build dir
        run: |
          rm -rf build Payload VTeenWebView.ipa
          mkdir -p build

          xcodebuild \
            -project VTeenWebView.xcodeproj \
            -scheme VTeenWebView \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath DerivedData \
            CONFIGURATION_BUILD_DIR=$PWD/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Inspect built app
        run: |
          echo "=== BUILD DIR ==="
          ls -la build || true
          echo "=== FIND APP ==="
          find "$PWD" -name "*.app" -print
          echo "=== APP CONTENTS ==="
          ls -la build/VTeenWebView.app
          echo "=== EXECUTABLE ==="
          file build/VTeenWebView.app/VTeenWebView || true
          echo "=== INFO PLIST ==="
          plutil -p build/VTeenWebView.app/Info.plist || true

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R build/VTeenWebView.app Payload/
          /usr/bin/zip -r VTeenWebView.ipa Payload

      - name: Verify IPA
        run: |
          echo "=== IPA SIZE ==="
          ls -lh VTeenWebView.ipa
          du -h VTeenWebView.ipa
          echo "=== IPA CONTENTS ==="
          unzip -l VTeenWebView.ipa | sed -n '1,120p'

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VTeenWebView-ipa
          path: VTeenWebView.ipa

      - name: Upload built app
        uses: actions/upload-artifact@v4
        with:
          name: VTeenWebView-app
          path: build/VTeenWebView.app
