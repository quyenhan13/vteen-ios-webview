name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Archive app (QUAN TRỌNG)
        run: |
          xcodebuild \
            -project VTeenWebView.xcodeproj \
            -scheme VTeenWebView \
            -sdk iphoneos \
            -configuration Release \
            archive \
            -archivePath $PWD/build/VTeenWebView.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA (chuẩn Apple)
        run: |
          mkdir -p Payload
          cp -R build/VTeenWebView.xcarchive/Products/Applications/*.app Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload VTeenWebView.ipa

      - name: Check IPA
        run: |
          ls -lh VTeenWebView.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VTeenWebView-ipa
          path: VTeenWebView.ipa
