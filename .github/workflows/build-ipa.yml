name: Build IPA

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild \
            -project VTeenWebView.xcodeproj \
            -scheme VTeenWebView \
            -sdk iphoneos \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=$PWD/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Check build output
        run: |
          echo "=== BUILD FOLDER ==="
          ls -la build
          find build -maxdepth 2 -name "*.app" -print

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/VTeenWebView.app Payload/
          zip -r VTeenWebView.ipa Payload

      - name: Check IPA size
        run: |
          ls -lh VTeenWebView.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VTeenWebView-ipa
          path: VTeenWebView.ipa
