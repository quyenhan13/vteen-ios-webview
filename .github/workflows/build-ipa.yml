name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild \
            -project VTeenWebView.xcodeproj \
            -scheme VTeenWebView \
            -sdk iphoneos \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=$PWD/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Check build output
        run: |
          echo "=== BUILD FOLDER ==="
          ls -la build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/VTeenWebView.app Payload/
          cd Payload
          zip -r ../VTeenWebView.ipa VTeenWebView.app
          cd ..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VTeenWebView-ipa
          path: VTeenWebView.ipa
